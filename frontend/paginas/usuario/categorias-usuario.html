<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías - Panel Usuario</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>

<body>

  <nav class="topbar" id="app-topbar"></nav>

  <div class="app-container">
    <aside class="sidebar" id="app-sidebar-user"></aside>

    <main class="main-content">
      <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h2 class="fw-bold text-primary mb-0">
              <i class="bi bi-tags me-2"></i>Categorías
            </h2>
            <p class="text-muted mb-0">Explora las categorías de productos</p>
          </div>
          <a href="panel.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Volver al panel
          </a>
        </div>

        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-6">
                <input type="text" id="inputBuscar" class="form-control" placeholder="Buscar categoría...">
              </div>
            </div>
          </div>
        </div>

        <div id="vistaCards" class="row g-4" style="min-height: 400px;">
          <div class="col-12 text-center">
            <div class="spinner-border text-primary mt-5" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </div>
        </div>

        <footer class="text-center mt-4 small text-muted">
          © 2025 Grupo Coyahue — Sistema de Inventario
        </footer>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { API } from "/src/js/api.js";

    let categoriasCache = [];

    // ... (Funciones de sidebar y topbar iguales que antes) ...
    function cargarSidebarUsuario() {
      const sidebar = document.getElementById("app-sidebar-user");
      if (!sidebar) return;
      sidebar.innerHTML = `
        <div class="logo-container"><img src="/src/img/logo-coyahue.png" alt="Logo" class="logo" /></div>
        <nav class="nav flex-column">
          <small>Principal</small>
          <a class="nav-link" href="panel.html"><i class="bi bi-grid-fill"></i> Panel General</a>
          <small>Consultas</small>
          <a class="nav-link" href="productos-usuario.html"><i class="bi bi-box-seam"></i> Productos</a>
          <a class="nav-link active" href="categorias-usuario.html"><i class="bi bi-tags"></i> Categorías</a>
          <a class="nav-link" href="sucursales-usuario.html"><i class="bi bi-geo-alt"></i> Sucursales</a>
          <a class="nav-link" href="proveedores-usuario.html"><i class="bi bi-truck"></i> Proveedores</a>
          <small>Herramientas</small>
          <a class="nav-link" href="reportes-usuario.html"><i class="bi bi-file-earmark-bar-graph"></i> Reportes</a>
          <a class="nav-link" href="/paginas/usuario/ajustes-usuario.html"><i class="bi bi-gear"></i> Mi Cuenta</a>
        </nav>
      `;
    }

    function cargarTopbarUsuario() {
      const topbar = document.getElementById("app-topbar");
      if (!topbar) return;
      const usuarioLog = localStorage.getItem("username") || "Usuario";
      const inicial = usuarioLog.charAt(0).toUpperCase();
      topbar.innerHTML = `
        <div class="d-flex align-items-center">
          <button class="menu-toggle me-3" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="bi bi-list"></i></button>
          <span class="fw-bold text-white d-lg-none">Coyahue</span>
        </div>
        <div class="topbar-right">
          <span id="btn-dark-toggle" class="toggle-dark" role="button"><i class="bi bi-moon-stars-fill" id="dark-icon"></i></span>
          <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle user-area" data-bs-toggle="dropdown">
              <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-2" style="width:32px; height:32px; font-weight:bold;">${inicial}</div>
              <span class="d-none d-md-block">${usuarioLog}</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
              <li><a class="dropdown-item" href="/paginas/usuario/ajustes-usuario.html">Mi Perfil</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" onclick="window.cerrarSesion()">Cerrar sesión</a></li>
            </ul>
          </div>
        </div>
      `;
    }

    function normalizarLista(res) {
      if (Array.isArray(res)) return res;
      if (res && Array.isArray(res.results)) return res.results;
      return [];
    }

    function getCategoriaImagen(cat) {
      const img = cat.imagen_absoluta || cat.imagen_url || cat.imagen || "";
      if (!img) return "/src/img/categoria-default.png";
      if (img.startsWith("http://") || img.startsWith("https://")) return img;
      return img;
    }

    async function cargarCategorias() {
      try {
        const res = await API.get("categorias/");
        categoriasCache = normalizarLista(res);
        renderCategorias(categoriasCache);
      } catch (err) {
        console.error("Error al cargar categorías:", err);
        document.getElementById("vistaCards").innerHTML = `
          <div class="col-12 text-center text-danger">
            <i class="bi bi-exclamation-circle fs-1"></i>
            <p class="mt-2">No se pudieron cargar las categorías.</p>
          </div>
        `;
      }
    }

    function aplicarFiltros() {
      const texto = (document.getElementById("inputBuscar")?.value || "").toLowerCase();
      const filtradas = categoriasCache.filter(c => {
        const nombre = (c.nombre || "").toLowerCase();
        return nombre.includes(texto);
      });
      renderCategorias(filtradas);
    }

    // --- AQUÍ ESTÁ EL CAMBIO PRINCIPAL ---
    function renderCategorias(lista) {
      const cont = document.getElementById("vistaCards");
      if (!cont) return;

      if (!lista.length) {
        cont.innerHTML = `
          <div class="col-12 text-center text-muted">
            <i class="bi bi-inbox fs-1"></i>
            <p class="mt-2">No hay categorías que coincidan con la búsqueda.</p>
          </div>
        `;
        return;
      }

      cont.innerHTML = "";

      lista.forEach(c => {
        const col = document.createElement("div");
        col.className = "col-md-4 col-lg-3";
        const imagen = getCategoriaImagen(c);
        
        // Redirección con parámetro en la URL
        const irAProductos = `window.location.href='productos-usuario.html?categoria=${encodeURIComponent(c.nombre)}'`;

        col.innerHTML = `
          <div class="card h-100 p-4 text-center shadow-sm border-0" 
               style="cursor:pointer; transition: transform 0.2s;" 
               onmouseover="this.style.transform='translateY(-5px)'" 
               onmouseout="this.style.transform='translateY(0)'"
               onclick="${irAProductos}">
            
            <img src="${imagen}" alt="${c.nombre}" 
                 style="max-height:140px; width:100%; object-fit:contain;" class="mb-3">
            
            <h5 class="fw-bold mb-0 text-dark">${c.nombre || "Sin nombre"}</h5>
          </div>
        `;

        cont.appendChild(col);
      });
    }

    window.cerrarSesion = function() {
      localStorage.clear();
      window.location.href = "/paginas/login/login.html";
    };

    function configurarTema() {
      const body = document.body;
      const toggle = document.getElementById("btn-dark-toggle");
      const icon = document.getElementById("dark-icon");
      if (!toggle || !icon) return;

      const temaGuardado = localStorage.getItem("theme") || "light";
      if (temaGuardado === "dark") {
        body.classList.add("dark-mode");
        icon.classList.replace("bi-moon-stars-fill", "bi-brightness-high-fill");
      }

      toggle.addEventListener("click", () => {
        const esDark = body.classList.toggle("dark-mode");
        icon.classList.toggle("bi-moon-stars-fill", !esDark);
        icon.classList.toggle("bi-brightness-high-fill", esDark);
        localStorage.setItem("theme", esDark ? "dark" : "light");
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      cargarTopbarUsuario();
      cargarSidebarUsuario();
      configurarTema();
      cargarCategorias();

      document.getElementById("inputBuscar")?.addEventListener("input", aplicarFiltros);
    });
  </script>

</body>
</html>
