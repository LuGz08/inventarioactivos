<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sucursales - Panel Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>

  <nav class="topbar" id="app-topbar"></nav>
  <div class="app-container">
    <aside class="sidebar" id="app-sidebar-user"></aside>
    <main class="main-content">
      <div class="container-fluid">
        
        <div class="mb-4">
          <h2 class="fw-bold text-primary mb-1"><i class="bi bi-geo-alt me-2"></i>Sucursales</h2>
          <p class="text-muted">Nuestras ubicaciones.</p>
        </div>

        <div class="row g-4" id="gridSucursales">
          <div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { API } from "/src/js/api.js";

    document.addEventListener("DOMContentLoaded", async () => {
      // Cargar UI
      const user = localStorage.getItem("username") || "Usuario";
      document.getElementById("app-topbar").innerHTML = `<div class="d-flex align-items-center"><button class="menu-toggle me-3" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="bi bi-list"></i></button><span class="fw-bold text-white d-lg-none">Coyahue</span></div><div class="topbar-right"><div class="dropdown"><a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle user-area" data-bs-toggle="dropdown"><div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-2" style="width:32px; height:32px; font-weight:bold;">${user.charAt(0).toUpperCase()}</div><span class="d-none d-md-block">${user}</span></a><ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"><li><a class="dropdown-item" href="/paginas/usuario/ajustes-usuario.html">Mi Perfil</a></li><li><hr class="dropdown-divider"></li><li><a class="dropdown-item text-danger" onclick="localStorage.clear(); location.href='/paginas/login/login.html'">Cerrar sesión</a></li></ul></div></div>`;
      document.getElementById("app-sidebar-user").innerHTML = `<div class="logo-container"><img src="/src/img/logo-coyahue.png" alt="Logo" class="logo" /></div><nav class="nav flex-column"><small>Principal</small><a class="nav-link" href="panel.html"><i class="bi bi-grid-fill"></i> Panel General</a><small>Consultas</small><a class="nav-link" href="productos-usuario.html"><i class="bi bi-box-seam"></i> Productos</a><a class="nav-link" href="categorias-usuario.html"><i class="bi bi-tags"></i> Categorías</a><a class="nav-link active" href="sucursales-usuario.html"><i class="bi bi-geo-alt"></i> Sucursales</a><a class="nav-link" href="proveedores-usuario.html"><i class="bi bi-truck"></i> Proveedores</a><small>Herramientas</small><a class="nav-link" href="reportes-usuario.html"><i class="bi bi-file-earmark-bar-graph"></i> Reportes</a><a class="nav-link" href="/paginas/usuario/ajustes-usuario.html"><i class="bi bi-gear"></i> Mi Cuenta</a></nav>`;

      // Cargar Datos
      try {
        const res = await API.get("sucursales/");
        const lista = Array.isArray(res) ? res : res.results;
        const container = document.getElementById("gridSucursales");
        
        if(!lista.length) { container.innerHTML = '<div class="col-12 text-center text-muted">No hay sucursales registradas.</div>'; return; }

        container.innerHTML = lista.map(s => `
          <div class="col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm border-0">
              <div class="card-body">
                <div class="d-flex align-items-center gap-3 mb-3">
                  <div class="bg-info bg-opacity-10 text-info p-3 rounded-circle"><i class="bi bi-building fs-4"></i></div>
                  <h5 class="fw-bold mb-0">${s.nombre}</h5>
                </div>
                <p class="text-muted mb-2"><i class="bi bi-geo-alt me-2"></i> ${s.direccion || "Sin dirección"}</p>
                <p class="text-muted mb-0"><i class="bi bi-telephone me-2"></i> ${s.telefono || "S/N"}</p>
              </div>
            </div>
          </div>
        `).join("");
      } catch (e) {
        document.getElementById("gridSucursales").innerHTML = '<div class="col-12 text-danger text-center">Error al cargar datos.</div>';
      }
    });
  </script>
</body>
</html>
