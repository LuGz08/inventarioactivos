<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cuenta - Panel Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>

  <nav class="topbar" id="app-topbar"></nav>
  <div class="app-container">
    <aside class="sidebar" id="app-sidebar-user"></aside>
    <main class="main-content">
      <div class="container-fluid">
        
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0 p-4">
              <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width:80px; height:80px; font-size:2rem; font-weight:bold;">
                  <span id="userInitial">U</span>
                </div>
                <h4 class="fw-bold mb-0" id="profileName">Cargando...</h4>
                <p class="text-muted">Perfil de Usuario</p>
              </div>

              <form id="formPassword">
                <h6 class="border-bottom pb-2 mb-3 fw-bold">Seguridad</h6>
                <div class="mb-3">
                  <label class="form-label">Contraseña Actual</label>
                  <input type="password" id="oldPass" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Nueva Contraseña</label>
                  <input type="password" id="newPass" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Actualizar Contraseña</button>
              </form>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { API } from "/src/js/api.js";

    document.addEventListener("DOMContentLoaded", async () => {
      const user = localStorage.getItem("username") || "Usuario";
      document.getElementById("app-topbar").innerHTML = `<div class="d-flex align-items-center"><button class="menu-toggle me-3" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="bi bi-list"></i></button><span class="fw-bold text-white d-lg-none">Coyahue</span></div><div class="topbar-right"><div class="dropdown"><a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle user-area" data-bs-toggle="dropdown"><div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-2" style="width:32px; height:32px; font-weight:bold;">${user.charAt(0).toUpperCase()}</div><span class="d-none d-md-block">${user}</span></a><ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"><li><a class="dropdown-item" href="/paginas/usuario/ajustes-usuario.html">Mi Perfil</a></li><li><hr class="dropdown-divider"></li><li><a class="dropdown-item text-danger" onclick="localStorage.clear(); location.href='/paginas/login/login.html'">Cerrar sesión</a></li></ul></div></div>`;
      document.getElementById("app-sidebar-user").innerHTML = `<div class="logo-container"><img src="/src/img/logo-coyahue.png" alt="Logo" class="logo" /></div><nav class="nav flex-column"><small>Principal</small><a class="nav-link" href="panel.html"><i class="bi bi-grid-fill"></i> Panel General</a><small>Consultas</small><a class="nav-link" href="productos-usuario.html"><i class="bi bi-box-seam"></i> Productos</a><a class="nav-link" href="categorias-usuario.html"><i class="bi bi-tags"></i> Categorías</a><a class="nav-link" href="sucursales-usuario.html"><i class="bi bi-geo-alt"></i> Sucursales</a><a class="nav-link" href="proveedores-usuario.html"><i class="bi bi-truck"></i> Proveedores</a><small>Herramientas</small><a class="nav-link" href="reportes-usuario.html"><i class="bi bi-file-earmark-bar-graph"></i> Reportes</a><a class="nav-link active" href="/paginas/usuario/ajustes-usuario.html"><i class="bi bi-gear"></i> Mi Cuenta</a></nav>`;

      // Cargar info perfil
      document.getElementById("profileName").textContent = user;
      document.getElementById("userInitial").textContent = user.charAt(0).toUpperCase();

      // Cambio Password
      document.getElementById("formPassword").addEventListener("submit", async (e) => {
        e.preventDefault();
        const old_password = document.getElementById("oldPass").value;
        const new_password = document.getElementById("newPass").value;

        if (new_password.length < 8) return alert("La contraseña debe tener al menos 8 caracteres");

        try {
          await API.post("usuarios/cambiar_password/", { old_password, new_password });
          alert("Contraseña actualizada correctamente");
          document.getElementById("formPassword").reset();
        } catch (err) {
          alert("Error: Verifica tu contraseña actual");
        }
      });
    });
  </script>
</body>
</html>
