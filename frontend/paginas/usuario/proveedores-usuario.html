<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proveedores - Panel Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>

  <nav class="topbar" id="app-topbar"></nav>
  <div class="app-container">
    <aside class="sidebar" id="app-sidebar-user"></aside>
    <main class="main-content">
      <div class="container-fluid">
        
        <div class="mb-4">
          <h2 class="fw-bold text-primary mb-1"><i class="bi bi-truck me-2"></i>Proveedores</h2>
          <p class="text-muted">Lista de socios comerciales.</p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="table-scroll">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light"><tr><th>Empresa</th><th>RUT</th><th>Contacto</th><th>Email</th></tr></thead>
              <tbody id="listaProveedores">
                <tr><td colspan="4" class="text-center py-4">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { API } from "/src/js/api.js";

    document.addEventListener("DOMContentLoaded", async () => {
      const user = localStorage.getItem("username") || "Usuario";
      document.getElementById("app-topbar").innerHTML = `<div class="d-flex align-items-center"><button class="menu-toggle me-3" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="bi bi-list"></i></button><span class="fw-bold text-white d-lg-none">Coyahue</span></div><div class="topbar-right"><div class="dropdown"><a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle user-area" data-bs-toggle="dropdown"><div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-2" style="width:32px; height:32px; font-weight:bold;">${user.charAt(0).toUpperCase()}</div><span class="d-none d-md-block">${user}</span></a><ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"><li><a class="dropdown-item" href="/paginas/usuario/ajustes-usuario.html">Mi Perfil</a></li><li><hr class="dropdown-divider"></li><li><a class="dropdown-item text-danger" onclick="localStorage.clear(); location.href='/paginas/login/login.html'">Cerrar sesión</a></li></ul></div></div>`;
      document.getElementById("app-sidebar-user").innerHTML = `<div class="logo-container"><img src="/src/img/logo-coyahue.png" alt="Logo" class="logo" /></div><nav class="nav flex-column"><small>Principal</small><a class="nav-link" href="panel.html"><i class="bi bi-grid-fill"></i> Panel General</a><small>Consultas</small><a class="nav-link" href="productos-usuario.html"><i class="bi bi-box-seam"></i> Productos</a><a class="nav-link" href="categorias-usuario.html"><i class="bi bi-tags"></i> Categorías</a><a class="nav-link" href="sucursales-usuario.html"><i class="bi bi-geo-alt"></i> Sucursales</a><a class="nav-link active" href="proveedores-usuario.html"><i class="bi bi-truck"></i> Proveedores</a><small>Herramientas</small><a class="nav-link" href="reportes-usuario.html"><i class="bi bi-file-earmark-bar-graph"></i> Reportes</a><a class="nav-link" href="/paginas/usuario/ajustes-usuario.html"><i class="bi bi-gear"></i> Mi Cuenta</a></nav>`;

      try {
        const res = await API.get("proveedores/");
        const lista = Array.isArray(res) ? res : res.results;
        const tbody = document.getElementById("listaProveedores");
        
        if(!lista.length) { tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No hay proveedores.</td></tr>`; return; }

        tbody.innerHTML = lista.map(p => `
          <tr>
            <td class="fw-bold">${p.nombre}</td>
            <td><span class="badge bg-light text-dark border">${p.rut}</span></td>
            <td>${p.contacto || '-'}</td>
            <td><a href="mailto:${p.correo}" class="text-decoration-none">${p.correo || '-'}</a></td>
          </tr>
        `).join("");
      } catch (e) {
        document.getElementById("listaProveedores").innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error cargando datos.</td></tr>`;
      }
    });
  </script>
</body>
</html>
