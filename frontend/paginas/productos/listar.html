<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Inventario Coyahue</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Estilos generales -->
  <link rel="stylesheet" href="/src/css/styles.css">

  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    .filtros-componentes {
      background: #f8f9fa;
      border-left: 4px solid #0d6efd;
      transition: all 0.3s ease;
    }
    
    .componentes-col {
      background: #f8f9fa;
      font-size: 0.85rem;
    }
    
    #btnFiltroComponentes.active {
      background: #0d6efd;
      color: white;
    }
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <nav class="topbar" id="app-topbar"></nav>

  <div class="app-container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="app-sidebar"></aside>

    <!-- CONTENT -->
    <main class="main-content">
      <div class="container-fluid">

        <!-- TÍTULO + BOTONES -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h2 class="fw-bold text-primary">Productos</h2>
            <p class="text-muted">Gestión de equipos registrados.</p>
          </div>
          <div>
            <button id="btnTabla" class="btn btn-outline-primary btn-sm me-2 active">
              <i class="bi bi-table"></i> Tabla
            </button>
            <button id="btnTarjetas" class="btn btn-outline-primary btn-sm me-2">
              <i class="bi bi-grid"></i> Tarjetas
            </button>

            <a href="agregar.html" class="btn btn-primary btn-sm">
              <i class="bi bi-plus-lg"></i> Nuevo
            </a>
          </div>
        </div>

        <!-- FILTROS PRINCIPALES -->
        <div class="row g-2 mb-3">
          <div class="col-md-3">
            <input id="inputBuscar" type="text" class="form-control" placeholder="Buscar por modelo o nro serie...">
          </div>
          <div class="col-md-2">
            <select id="filtroCategoria" class="form-select">
              <option value="">Categoría: Todas</option>
            </select>
          </div>
          <div class="col-md-2">
            <select id="filtroSucursal" class="form-select">
              <option value="">Sucursal: Todas</option>
            </select>
          </div>
          <div class="col-md-2">
            <select id="filtroEstado" class="form-select">
              <option value="">Estado: Todos</option>
            </select>
          </div>
          <div class="col-md-3">
            <button id="btnFiltroComponentes" class="btn btn-outline-secondary w-100">
              <i class="bi bi-sniper"></i> Filtrar por componentes
            </button>
          </div>
        </div>

        <!-- FILTROS DE COMPONENTES (COLAPSABLE) -->
        <div id="filtrosComponentes" class="collapse mb-3">
          <div class="card filtros-componentes p-3">
            <div class="row g-2">
              <div class="col-12 mb-2">
                <h6 class="fw-bold text-primary mb-0">
                  <i class="bi bi-sliders"></i> Filtros de Componentes
                </h6>
              </div>
              
              <div class="col-md-3">
                <label class="form-label small">CPU</label>
                <select id="filtroCPU" class="form-select form-select-sm">
                  <option value="">Todas las CPUs</option>
                </select>
              </div>
              
              <div class="col-md-3">
                <label class="form-label small">GPU</label>
                <select id="filtroGPU" class="form-select form-select-sm">
                  <option value="">Todas las GPUs</option>
                </select>
              </div>
              
              <div class="col-md-2">
                <label class="form-label small">RAM mínima (GB)</label>
                <input type="number" id="filtroRAMMin" class="form-control form-control-sm" placeholder="8, 16...">
              </div>
              
              <div class="col-md-2">
                <label class="form-label small">Almacenamiento mín. (GB)</label>
                <input type="number" id="filtroAlmMin" class="form-control form-control-sm" placeholder="256, 512...">
              </div>
              
              <div class="col-md-2 d-flex align-items-end">
                <button id="btnLimpiarFiltrosComp" class="btn btn-sm btn-outline-danger w-100">
                  <i class="bi bi-x-circle"></i> Limpiar
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- TABLA ESTÁNDAR -->
        <div id="vistaTabla">
          <div class="card p-3">
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead>
                  <tr>
                    <th></th>
                    <th>Nro Serie</th>
                    <th>Producto</th>
                    <th>Sucursal</th>
                    <th>Factura</th>
                    <th>Garantía</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tbodyProductos"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- TABLA CON COMPONENTES -->
        <div id="vistaTablaComponentes" class="d-none">
          <div class="card p-3">
            <div class="table-responsive">
              <table class="table table-hover align-middle table-sm">
                <thead>
                  <tr>
                    <th></th>
                    <th>Nro Serie</th>
                    <th>Producto</th>
                    <th class="componentes-col">CPU</th>
                    <th class="componentes-col">GPU</th>
                    <th class="componentes-col">RAM</th>
                    <th class="componentes-col">Almac.</th>
                    <th>Sucursal</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tbodyProductosComponentes"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- CARDS -->
        <div id="vistaTarjetas" class="d-none">
          <div id="cardsProductos" class="row g-4"></div>
        </div>

        <!-- MODAL SCANNER QR -->
        <div class="modal fade" id="modalScanner" tabindex="-1">
          <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">
                  <i class="bi bi-qr-code-scan"></i> Escanear Código QR
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body text-center">
                <div id="qr-reader" class="w-100"></div>
                <p class="text-muted small mt-2">Apunta la cámara al código QR</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/src/js/main.js"></script>
  <script type="module" src="/src/js/productos.js"></script>

</body>

</html>
