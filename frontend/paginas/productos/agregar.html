<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Producto - Inventario Coyahue</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="/src/css/styles.css">
</head>

<body>
  <!-- TOPBAR -->
  <nav class="topbar" id="app-topbar"></nav>

  <div class="app-container">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="app-sidebar"></aside>

    <!-- CONTENIDO -->
    <main class="main-content">
      <div class="container-fluid">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="fw-bold text-primary mb-0">Nuevo Producto</h2>
          <a href="listar.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Volver
          </a>
        </div>

        <div class="row g-4">

          <!-- FORMULARIO -->
          <div class="col-lg-8">
            <div class="card p-4">
              <form id="formProducto">
                <div class="row g-3">

                  <div class="col-md-4">
                    <label class="form-label">Nro. de serie *</label>
                    <input type="text" class="form-control" id="codigo" required>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Proveedor *</label>
                    <select id="proveedor" class="form-select" required>
                      <option value="">Cargando...</option>
                    </select>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Modelo *</label>
                    <select id="modelo" class="form-select" required>
                      <option value="">Cargando...</option>
                    </select>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Categoría *</label>
                    <select id="categoria" class="form-select" required>
                      <option value="">Cargando...</option>
                    </select>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Sucursal (opcional)</label>
                    <select id="sucursal" class="form-select">
                      <option value="">(Ninguna)</option>
                    </select>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Estado *</label>
                    <select id="estado" class="form-select" required>
                      <option value="">Cargando...</option>
                    </select>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Fecha de compra *</label>
                    <input type="date" class="form-control" id="fechaCompra" required>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Meses de garantía *</label>
                    <input type="number" class="form-control" id="mesesGarantia" min="0" required>
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Factura / Documento *</label>
                    <input type="text" class="form-control" id="factura" required
                      placeholder="FAC-2024-0012 o similar">
                  </div>

                </div>

                <!-- COMPONENTES DEL PRODUCTO -->
                <div class="card mt-4 p-3 border-primary">
                  <h5 class="fw-bold text-primary mb-3">Componentes del equipo</h5>

                  <div class="row g-3">

                    <div class="col-md-6">
                      <label class="form-label">CPU</label>
                      <div class="input-group">
                        <select id="cpu" class="form-select">
                          <option value="">Cargando...</option>
                        </select>
                        <button type="button" id="btnNuevaCPU" class="btn btn-outline-primary">
                          <i class="bi bi-plus"></i>
                        </button>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <label class="form-label">GPU</label>
                      <div class="input-group">
                        <select id="gpu" class="form-select">
                          <option value="">Cargando...</option>
                        </select>
                        <button type="button" id="btnNuevaGPU" class="btn btn-outline-primary">
                          <i class="bi bi-plus"></i>
                        </button>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <label class="form-label">RAM (GB) </label>
                      <input type="number" id="ram" class="form-control" min="1" >
                    </div>

                    <div class="col-md-6">
                      <label class="form-label">Almacenamiento (GB) </label>
                      <input type="number" id="almacenamiento" class="form-control" min="1">
                    </div>

                  </div>
                </div>

                <div class="mt-4 d-flex justify-content-end gap-2">
                  <a href="listar.html" class="btn btn-outline-secondary">Cancelar</a>
                  <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
              </form>
            </div>
          </div>

          <!-- QR / INFO LATERAL -->
          <div class="col-lg-4">
            <div class="card p-4 text-center">
              <h5 class="mb-3 fw-semibold">QR del Producto</h5>
              <div id="qrPreview" class="mb-3 text-muted small">
                El QR se generará automáticamente después de guardar el producto.
              </div>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <!-- MODAL: Crear nueva CPU -->
<div class="modal fade" id="modalNuevaCPU" tabindex="-1" aria-labelledby="modalNuevaCPULabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalNuevaCPULabel">Agregar nueva CPU</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="formNuevaCPU">
          <div class="mb-3">
            <label class="form-label">Marca</label>
            <input type="text" id="cpuNombre" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Modelo</label>
            <input type="text" id="cpuGeneracion" class="form-control" required>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" id="btnGuardarCPU">Guardar</button>
      </div>
    </div>
  </div>
</div>



<!-- MODAL: Crear nueva GPU -->
<div class="modal fade" id="modalNuevaGPU" tabindex="-1" aria-labelledby="modalNuevaGPULabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalNuevaGPULabel">Agregar nueva GPU</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="formNuevaGPU">
          <div class="mb-3">
            <label class="form-label">Marca</label>
            <input type="text" id="gpuNombre" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Modelo</label>
            <input type="text" id="gpuTipo" class="form-control" required>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" id="btnGuardarGPU">Guardar</button>
      </div>
    </div>
  </div>
</div>


  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="/src/js/main.js"></script>
  <script type="module" src="/src/js/productos.js"></script>
</body>
</html>
