<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Producto - Inventario Coyahue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body>
  <nav class="topbar" id="app-topbar"></nav>
  <div class="app-container">
    <aside class="sidebar" id="app-sidebar"></aside>
    <main class="main-content">
      <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h2 class="fw-bold text-primary mb-0"><i class="bi bi-pencil-square me-2"></i>Editar Producto</h2>
            <p class="text-muted mb-0">Modifica los datos del equipo seleccionado.</p>
          </div>
          <a href="listar.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Volver</a>
        </div>

        <div class="card p-4 shadow-sm border-0">
          <form id="formEditarProducto">
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">Código / N° Serie *</label><input type="text" id="codigo" class="form-control" required /></div>
              <div class="col-md-4"><label class="form-label">Proveedor *</label><select id="proveedor" class="form-select" required><option value="">Cargando...</option></select></div>
              <div class="col-md-4"><label class="form-label">Categoría *</label><select id="categoria" class="form-select" required><option value="">Cargando...</option></select></div>
              <div class="col-md-6"><label class="form-label">Marca *</label><select id="marca" class="form-select" required><option value="">Cargando...</option></select></div>
              <div class="col-md-6"><label class="form-label">Modelo *</label><select id="modelo" class="form-select" required><option value="">Sel. marca...</option></select></div>
              <div class="col-md-4"><label class="form-label">Estado *</label><select id="estado" class="form-select" required><option value="">Cargando...</option></select></div>
              <div class="col-md-4"><label class="form-label">Sucursal</label><select id="sucursal" class="form-select"><option value="">Cargando...</option></select></div>

              <div class="col-md-4">
                <label class="form-label">Fecha de compra *</label>
                <input type="date" id="fechaCompra" class="form-control" required />
              </div>

              <div class="col-md-4">
                <label class="form-label">Garantía (meses) *</label>
                <input type="number" min="0" id="mesesGarantia" class="form-control" required />
              </div>

              <div class="col-md-4">
                <label class="form-label text-muted">Vencimiento (Calc)</label>
                <input type="text" id="fechaVencimientoCalc" class="form-control bg-light" readonly placeholder="Se calcula al guardar">
              </div>

              <div class="col-md-4">
                <label class="form-label">Valor de compra</label>
                <input type="number" min="0" step="0.01" id="valorCompra" class="form-control" />
              </div>

              <div class="col-md-12">
                 <div class="card border-info"><div class="card-header bg-info text-white fw-bold">Facturación</div><div class="card-body"><select id="facturaSelect" class="form-select"><option value="">Seleccione...</option></select></div></div>
              </div>
              <div class="col-12 mt-4 d-flex justify-content-end gap-2">
                <a href="listar.html" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
              </div>
            </div>
          </form>
        </div>
        <div class="footer"><p>© 2025 Grupo Coyahue</p></div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/src/js/main.js"></script>
  <script type="module" src="/src/js/productos.js"></script>
</body>
</html>
