<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eliminar Proveedor - Grupo Coyahue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>

  <nav class="topbar" id="app-topbar"></nav>

  <div class="app-container">
    <aside class="sidebar" id="app-sidebar"></aside>

    <main class="main-content">
      <div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        
        <div class="card text-center shadow-lg w-100" style="max-width: 500px; border: none; border-radius: 12px; overflow: hidden;">
          <div class="card-header bg-danger text-white p-4">
            <h3 class="fw-bold mb-0"><i class="bi bi-exclamation-triangle-fill me-2"></i>Eliminar Proveedor</h3>
          </div>

          <div class="card-body p-4">
            <p class="fs-5 text-muted">¿Estás seguro de que deseas eliminar este registro?</p>
            
            <div id="proveedor-eliminar-info" class="bg-light p-3 rounded mb-4 border text-start">
              Cargando datos...
            </div>

            <p class="text-danger small fw-bold">Esta acción no se puede deshacer.</p>

            <form id="formEliminarProveedor">
              <div class="d-grid gap-2 d-sm-flex justify-content-center mt-4">
                <button type="submit" class="btn btn-danger btn-lg px-4"><i class="bi bi-trash me-2"></i>Sí, Eliminar</button>
                <a href="listar.html" class="btn btn-outline-secondary btn-lg px-4">Cancelar</a>
              </div>
            </form>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/src/js/main.js"></script>
  <script type="module" src="/src/js/proveedores.js"></script>
</body>
</html>
