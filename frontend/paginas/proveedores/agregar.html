<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Proveedor - Grupo Coyahue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
  <nav class="topbar" id="app-topbar"></nav>
  <div class="app-container">
    <aside class="sidebar" id="app-sidebar"></aside>
    <main class="main-content">
      <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h2 class="fw-bold text-primary mb-0">Agregar Nuevo Proveedor</h2>
            <p class="text-muted mb-0">Completa los datos del nuevo proveedor.</p>
          </div>
          <a href="listar.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Volver
          </a>
        </div>

        <div class="card p-4">
          <form id="formAgregarProveedor">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="nombre" class="form-label">Nombre comercial *</label>
                <input type="text" id="nombre" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label for="rut" class="form-label">RUT Empresa *</label>
                <input type="text" id="rut" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label for="contacto" class="form-label">Nombre de Contacto *</label>
                <input type="text" id="contacto" class="form-control" required>
              </div>
              <div class="col-md-3">
                <label for="telefono" class="form-label">Teléfono</label>
                <input type="tel" id="telefono" class="form-control">
              </div>
              <div class="col-md-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control">
              </div>
              
              <input type="hidden" id="ubicacion">

              <div class="col-12 mt-4 d-flex justify-content-end gap-2">
                <a href="listar.html" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-check-circle me-2"></i>Guardar Proveedor
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/src/js/main.js"></script>
  <script type="module" src="/src/js/proveedores.js"></script>
</body>
</html>
