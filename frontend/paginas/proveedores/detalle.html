<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle Proveedor - Grupo Coyahue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>

  <nav class="topbar" id="app-topbar"></nav>

  <div class="app-container">
    <aside class="sidebar" id="app-sidebar"></aside>

    <main class="main-content">
      <div class="container-fluid">
        
        <div class="mb-4 d-flex justify-content-between align-items-center">
          <div>
            <h2 class="fw-bold text-primary">Detalle del Proveedor</h2>
            <p class="text-muted mb-0">Información completa del proveedor.</p>
          </div>
          <a href="listar.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-2"></i>Volver</a>
        </div>

        <div class="row g-4">
          <div class="col-lg-6">
            <div class="card h-100 shadow-sm border-0">
              <div class="card-header bg-white border-bottom py-3">
                <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-info-circle me-2"></i>Datos Generales</h5>
              </div>
              <div class="card-body">
                <dl class="row mb-0">
                  <dt class="col-sm-4 text-muted">ID Sistema</dt>
                  <dd class="col-sm-8 fw-bold" id="det-id">...</dd>
                  
                  <dt class="col-sm-4 text-muted">Nombre</dt>
                  <dd class="col-sm-8" id="det-nombre">...</dd>
                  
                  <dt class="col-sm-4 text-muted">RUT</dt>
                  <dd class="col-sm-8" id="det-rut">...</dd>

                  <dt class="col-sm-4 text-muted">Contacto</dt>
                  <dd class="col-sm-8" id="det-contacto">...</dd>

                  <dt class="col-sm-4 text-muted">Teléfono</dt>
                  <dd class="col-sm-8" id="det-telefono">...</dd>

                  <dt class="col-sm-4 text-muted">Email</dt>
                  <dd class="col-sm-8"><a href="#" id="det-email" class="text-decoration-none">...</a></dd>

                  <dt class="col-sm-4 text-muted">Ubicación</dt>
                  <dd class="col-sm-8" id="det-ubicacion">...</dd>
                </dl>
              </div>
              <div class="card-footer bg-white border-top py-3 text-end">
                <a href="#" id="btn-editar-proveedor" class="btn btn-primary"><i class="bi bi-pencil me-2"></i>Editar</a>
              </div>
            </div>
          </div>

          <div class="col-lg-6">
            <div class="card h-100 shadow-sm border-0 bg-light">
              <div class="card-body d-flex flex-column justify-content-center align-items-center text-center p-5 text-muted opacity-75">
                <i class="bi bi-box-seam fs-1 mb-3"></i>
                <h5>Historial de Productos</h5>
                <p>Próximamente se mostrarán aquí los productos asociados a este proveedor.</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/src/js/main.js"></script>
  <script type="module" src="/src/js/proveedores.js"></script>
</body>
</html>
