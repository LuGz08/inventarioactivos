<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin - Inventario</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/src/css/styles.css"/>
</head>

<body>
  <nav class="topbar" id="app-topbar"></nav>

  <div class="app-container">
    <aside class="sidebar" id="app-sidebar"></aside>

    <main class="main-content">
      <div class="container-fluid">
        <div class="mb-3">
          <h2 class="fw-bold text-primary mb-0"><i class="bi bi-speedometer2 me-2"></i>Dashboard Admin</h2>
          <p class="text-muted mb-0">Resumen general del inventario y actividad.</p>
        </div>

        <!-- KPIs -->
        <div class="row g-3 mb-3">
          <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <div class="text-muted small">Total productos</div>
                  <div class="fs-3 fw-bold" id="kpiTotal">—</div>
                </div>
                <i class="bi bi-box-seam fs-1 text-primary"></i>
              </div>
            </div>
          </div>

          <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <div class="text-muted small">Garantías vigentes</div>
                  <div class="fs-3 fw-bold" id="kpiVigentes">—</div>
                </div>
                <i class="bi bi-shield-check fs-1 text-success"></i>
              </div>
            </div>
          </div>

          <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <div class="text-muted small">Garantías vencidas</div>
                  <div class="fs-3 fw-bold" id="kpiVencidas">—</div>
                </div>
                <i class="bi bi-shield-x fs-1 text-danger"></i>
              </div>
            </div>
          </div>

          <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <div class="text-muted small">Movimientos del mes</div>
                  <div class="fs-3 fw-bold" id="kpiMovMes">—</div>
                </div>
                <i class="bi bi-arrow-left-right fs-1 text-secondary"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- Tablas -->
        <div class="row g-3">
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
              <div class="card-header bg-white fw-bold">
                <i class="bi bi-diagram-3 me-2"></i>Por Categoría
              </div>
              <div class="card-body">
                <div id="tablaCategoria" class="small text-muted">Cargando...</div>
              </div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
              <div class="card-header bg-white fw-bold">
                <i class="bi bi-geo-alt me-2"></i>Por Sucursal
              </div>
              <div class="card-body">
                <div id="tablaSucursal" class="small text-muted">Cargando...</div>
              </div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
              <div class="card-header bg-white fw-bold">
                <i class="bi bi-arrow-repeat me-2"></i>Movimientos por Tipo
              </div>
              <div class="card-body">
                <div id="tablaMovTipo" class="small text-muted">Cargando...</div>
              </div>
            </div>
          </div>
        </div>

        <footer class="text-center mt-4 small text-muted">
          © 2025 Grupo Coyahue — Sistema de Inventario
        </footer>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/src/js/main.js"></script>
  <script type="module" src="/src/js/dashboard-admin.js"></script>
</body>
</html>
