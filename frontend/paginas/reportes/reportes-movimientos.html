<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reporte de Movimientos - Inventario</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/src/css/styles.css"/>
</head>

<body>
  <nav class="topbar" id="app-topbar"></nav>

  <div class="app-container">
    <aside class="sidebar" id="app-sidebar"></aside>

    <main class="main-content">
      <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h2 class="fw-bold text-primary mb-0">
              <i class="bi bi-arrow-left-right me-2"></i>Reporte de Movimientos
            </h2>
            <p class="text-muted mb-0">Entradas, salidas y ajustes registrados.</p>
          </div>
        </div>

        <div class="card shadow-sm border-0 mb-3">
          <div class="card-body">
            <form id="formFiltros" class="row g-3">
              <div class="col-md-3">
                <label class="form-label">Tipo</label>
                <select id="fTipo" class="form-select">
                  <option value="">Todos</option>
                  <option value="entrada">Entrada</option>
                  <option value="salida">Salida</option>
                  <option value="ajuste">Ajuste</option>
                </select>
              </div>

              <div class="col-md-3">
                <label class="form-label">Usuario (ID opcional)</label>
                <input id="fUsuario" class="form-control" placeholder="Ej: 3">
              </div>

              <div class="col-md-4">
                <label class="form-label">Texto</label>
                <input id="fTexto" class="form-control" placeholder="sku, proveedor, referencia, comentarios...">
              </div>

              <div class="col-md-2">
                <label class="form-label">Desde</label>
                <input id="fDesde" type="date" class="form-control">
              </div>

              <div class="col-md-2">
                <label class="form-label">Hasta</label>
                <input id="fHasta" type="date" class="form-control">
              </div>

              <div class="col-md-10 d-flex align-items-end justify-content-end gap-2">
                <button type="button" id="btnLimpiar" class="btn btn-outline-secondary">
                  <i class="bi bi-eraser me-1"></i>Limpiar
                </button>
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-funnel me-1"></i>Aplicar filtros
                </button>
              </div>
            </form>
          </div>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <div class="text-muted small">Total: <strong id="totalResultados">0</strong></div>
              <div id="estadoCarga" class="small text-muted"></div>
            </div>

            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>SKU</th>
                    <th>Cant.</th>
                    <th>Proveedor</th>
                    <th>Referencia</th>
                    <th>Usuario</th>
                    <th>Comentarios</th>
                  </tr>
                </thead>
                <tbody id="tbodyResultados">
                  <tr><td colspan="8" class="text-center text-muted">Cargando...</td></tr>
                </tbody>
              </table>
            </div>

          </div>
        </div>

        <footer class="text-center mt-4 small text-muted">
          © 2025 Grupo Coyahue — Sistema de Inventario
        </footer>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/src/js/main.js"></script>
  <script type="module" src="/src/js/reportes-movimientos.js"></script>
</body>
</html>
